<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Retro Glow Pong Icon</title>
  <desc id="desc">A glowing Pong court icon with cyan and magenta paddles.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="84" fill="#000"/>
  <circle cx="256" cy="256" r="196" fill="#091113"/>
  <path d="M256 92v328" stroke="#DDE9FF" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 24" opacity=".55"/>
  <g filter="url(#glow)">
    <rect x="82" y="170" width="30" height="172" rx="10" fill="#4AFFE7"/>
    <rect x="400" y="170" width="30" height="172" rx="10" fill="#FF4CCD"/>
    <circle cx="294" cy="228" r="20" fill="#fff"/>
  </g>
</svg>
