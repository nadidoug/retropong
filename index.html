<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Retro Glow Pong Prototype</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100dvw;
      height: 100dvh;
      background: #000;
      touch-action: none;
    }

    .rotate-screen {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top)) max(22px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(22px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 50% 42%, rgba(74, 255, 231, 0.18), transparent 18rem),
        #000;
      text-align: center;
    }

    .rotate-card {
      max-width: 330px;
    }

    .rotate-card strong {
      display: block;
      color: white;
      font-size: 1.75rem;
      line-height: 1;
      text-shadow: 0 0 22px rgba(74, 255, 231, 0.9);
    }

    .rotate-card span {
      display: block;
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .phone-icon {
      width: 74px;
      height: 118px;
      margin: 0 auto 22px;
      border: 4px solid rgba(255, 255, 255, 0.88);
      border-radius: 18px;
      box-shadow:
        0 0 24px rgba(74, 255, 231, 0.72),
        inset 0 0 20px rgba(255, 76, 205, 0.22);
      transform: rotate(90deg);
    }

    .rotate-screen.is-visible {
      display: grid;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="rotate-screen" id="rotateScreen" aria-live="polite">
    <div class="rotate-card">
      <div class="phone-icon" aria-hidden="true"></div>
      <strong>Turn iPhone Landscape</strong>
      <span>Retro Glow Pong is built for wide play. Rotate your phone for the full arcade view.</span>
    </div>
  </div>

  <script>
    // ------------------------------------------------------------
    // setup canvas
    // ------------------------------------------------------------

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const rotateScreen = document.getElementById("rotateScreen");

    let width = 0;
    let height = 0;
    let deviceScale = 1;
    let shouldShowRotatePrompt = false;

    const userAgent = navigator.userAgent || "";
    const isIPhone = /iPhone/i.test(userAgent);
    const isAppleChrome = /CriOS/i.test(userAgent);
    const isAppleSafari = /Safari/i.test(userAgent) && !/CriOS|FxiOS|EdgiOS|OPiOS/i.test(userAgent);
    const shouldEnforceLandscape = isIPhone && (isAppleSafari || isAppleChrome);

    // ------------------------------------------------------------
    // game state
    // ------------------------------------------------------------

    const player = {
      x: 24,
      y: 0,
      width: 12,
      height: 96,
      score: 0
    };

    const cpu = {
      x: 0,
      y: 0,
      width: 12,
      height: 96,
      score: 0,
      skill: 0.075
    };

    const ball = {
      x: 0,
      y: 0,
      radius: 8,
      vx: 4,
      vy: 2.2,
      speed: 4.5
    };

    const game = {
      rally: 0,
      flash: 0,
      message: "RETRO GLOW PONG"
    };

    // ------------------------------------------------------------
    // resize function
    // ------------------------------------------------------------

    function resizeCanvas() {
      deviceScale = Math.min(window.devicePixelRatio || 1, 2);
      width = Math.floor(window.visualViewport ? window.visualViewport.width : window.innerWidth);
      height = Math.floor(window.visualViewport ? window.visualViewport.height : window.innerHeight);
      shouldShowRotatePrompt = shouldEnforceLandscape && width < height;
      rotateScreen.classList.toggle("is-visible", shouldShowRotatePrompt);

      canvas.width = Math.floor(width * deviceScale);
      canvas.height = Math.floor(height * deviceScale);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);

      player.x = Math.max(18, width * 0.06);
      cpu.x = width - player.x - cpu.width;
      player.height = Math.max(76, Math.min(116, height * 0.16));
      cpu.height = player.height;

      if (player.y === 0) {
        player.y = height / 2 - player.height / 2;
        cpu.y = height / 2 - cpu.height / 2;
      }

      clampPaddles();
    }

    // ------------------------------------------------------------
    // input handlers
    // ------------------------------------------------------------

    function movePlayerTo(screenY) {
      player.y = screenY - player.height / 2;
      clampPaddles();
    }

    canvas.addEventListener("mousemove", function (event) {
      movePlayerTo(event.clientY);
    });

    canvas.addEventListener("touchstart", function (event) {
      event.preventDefault();
      if (event.touches.length > 0) {
        movePlayerTo(event.touches[0].clientY);
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", function (event) {
      event.preventDefault();
      if (event.touches.length > 0) {
        movePlayerTo(event.touches[0].clientY);
      }
    }, { passive: false });

    // ------------------------------------------------------------
    // reset after score
    // ------------------------------------------------------------

    function resetBall(direction) {
      ball.x = width / 2;
      ball.y = height / 2;
      ball.speed = 4.5;
      ball.vx = direction * ball.speed;
      ball.vy = (Math.random() * 2 - 1) * 3;
      game.rally = 0;
    }

    function resetGame() {
      player.score = 0;
      cpu.score = 0;
      player.y = height / 2 - player.height / 2;
      cpu.y = height / 2 - cpu.height / 2;
      resetBall(Math.random() > 0.5 ? 1 : -1);
    }

    // ------------------------------------------------------------
    // helpers
    // ------------------------------------------------------------

    function clampPaddles() {
      player.y = Math.max(0, Math.min(height - player.height, player.y));
      cpu.y = Math.max(0, Math.min(height - cpu.height, cpu.y));
    }

    function ballHitsPaddle(paddle) {
      return (
        ball.x + ball.radius > paddle.x &&
        ball.x - ball.radius < paddle.x + paddle.width &&
        ball.y + ball.radius > paddle.y &&
        ball.y - ball.radius < paddle.y + paddle.height
      );
    }

    function reflectFromPaddle(paddle, direction) {
      const paddleCenter = paddle.y + paddle.height / 2;
      const hitOffset = (ball.y - paddleCenter) / (paddle.height / 2);
      const clampedOffset = Math.max(-1, Math.min(1, hitOffset));

      game.rally++;
      ball.speed = Math.min(12, ball.speed + 0.35);
      ball.vx = direction * ball.speed;
      ball.vy = clampedOffset * ball.speed * 0.82;

      game.message = "RALLY " + game.rally;
    }

    // ------------------------------------------------------------
    // update function
    // ------------------------------------------------------------

    function update() {
      if (shouldShowRotatePrompt) {
        return;
      }

      if (game.flash > 0) {
        game.flash--;
      }

      // CPU gets harder as the score and rally increase.
      const difficulty = Math.min(0.18, cpu.skill + cpu.score * 0.012 + game.rally * 0.004);
      const cpuCenter = cpu.y + cpu.height / 2;
      cpu.y += (ball.y - cpuCenter) * difficulty;

      clampPaddles();

      ball.x += ball.vx;
      ball.y += ball.vy;

      // Top and bottom wall bounce.
      if (ball.y - ball.radius < 0) {
        ball.y = ball.radius;
        ball.vy *= -1;
      }

      if (ball.y + ball.radius > height) {
        ball.y = height - ball.radius;
        ball.vy *= -1;
      }

      // Paddle collisions.
      if (ball.vx < 0 && ballHitsPaddle(player)) {
        ball.x = player.x + player.width + ball.radius;
        reflectFromPaddle(player, 1);
      }

      if (ball.vx > 0 && ballHitsPaddle(cpu)) {
        ball.x = cpu.x - ball.radius;
        reflectFromPaddle(cpu, -1);
      }

      // Scoring.
      if (ball.x < -ball.radius) {
        cpu.score++;
        game.flash = 20;
        game.message = "CPU SCORES";
        resetBall(1);
      }

      if (ball.x > width + ball.radius) {
        player.score++;
        game.flash = 20;
        game.message = "PLAYER SCORES";
        resetBall(-1);
      }
    }

    // ------------------------------------------------------------
    // draw background
    // ------------------------------------------------------------

    function drawBackground() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, width, height);

      const glow = ctx.createRadialGradient(width / 2, height / 2, 10, width / 2, height / 2, Math.max(width, height) * 0.55);
      glow.addColorStop(0, "rgba(0, 255, 230, 0.10)");
      glow.addColorStop(0.45, "rgba(135, 82, 255, 0.05)");
      glow.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      if (game.flash > 0) {
        ctx.globalAlpha = game.flash / 80;
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, width, height);
        ctx.globalAlpha = 1;
      }
    }

    // ------------------------------------------------------------
    // draw center line
    // ------------------------------------------------------------

    function drawCenterLine() {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
      ctx.shadowBlur = 14;
      ctx.shadowColor = "rgba(105, 255, 241, 0.9)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 14]);
      ctx.beginPath();
      ctx.moveTo(width / 2, 76);
      ctx.lineTo(width / 2, height - 24);
      ctx.stroke();
      ctx.restore();
    }

    // ------------------------------------------------------------
    // draw paddles
    // ------------------------------------------------------------

    function drawPaddle(paddle, color) {
      const gradient = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.width, paddle.y + paddle.height);
      gradient.addColorStop(0, "rgba(255, 255, 255, 0.95)");
      gradient.addColorStop(0.45, color);
      gradient.addColorStop(1, "rgba(165, 116, 255, 0.95)");

      ctx.shadowBlur = 28;
      ctx.shadowColor = color;
      ctx.fillStyle = gradient;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

      ctx.globalAlpha = 0.45;
      ctx.fillStyle = "white";
      ctx.fillRect(paddle.x + 2, paddle.y + 6, 3, paddle.height - 12);
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    // ------------------------------------------------------------
    // draw ball
    // ------------------------------------------------------------

    function drawBall() {
      const gradient = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, ball.radius + 10);
      gradient.addColorStop(0, "white");
      gradient.addColorStop(0.35, "rgba(130, 255, 238, 0.95)");
      gradient.addColorStop(1, "rgba(255, 82, 221, 0.15)");

      ctx.shadowBlur = 30;
      ctx.shadowColor = "rgba(95, 255, 238, 0.95)";
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // ------------------------------------------------------------
    // draw scoreboard
    // ------------------------------------------------------------

    function drawScoreboard() {
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      ctx.shadowBlur = 14;
      ctx.shadowColor = "rgba(255, 255, 255, 0.7)";
      ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
      ctx.font = "bold 10px Arial";
      ctx.fillText("PLAYER", width * 0.27, 18);
      ctx.fillText("CPU", width * 0.73, 18);

      ctx.fillStyle = "white";
      ctx.font = "bold 36px Arial";
      ctx.fillText(String(player.score), width * 0.27, 32);
      ctx.fillText(String(cpu.score), width * 0.73, 32);

      ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
      ctx.font = "bold 12px Arial";
      ctx.fillText(game.message, width / 2, height - 38);

      ctx.shadowBlur = 0;
    }

    // ------------------------------------------------------------
    // draw function
    // ------------------------------------------------------------

    function draw() {
      drawBackground();
      drawCenterLine();
      drawPaddle(player, "rgba(74, 255, 231, 0.95)");
      drawPaddle(cpu, "rgba(255, 76, 205, 0.95)");
      drawBall();
      drawScoreboard();
    }

    // ------------------------------------------------------------
    // game loop using requestAnimationFrame
    // ------------------------------------------------------------

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", resizeCanvas);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resizeCanvas);
    }

    resizeCanvas();
    resetGame();
    gameLoop();
  </script>
</body>
</html>
